version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - VITE_API_URL=/api
    volumes:
      - ./backend:/app/backend
      - ./frontend/src:/app/frontend/src
      - /app/backend/node_modules
      - /app/frontend/node_modules
